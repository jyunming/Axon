# YAML anchor for the test-trigger regex shared by pytest-check + eval-smoke.
# Both hooks must trigger on the SAME set of files (real source/dep edits) —
# defining once here prevents the two regexes from drifting over time.
x-test-trigger-files: &test-trigger-files
  '^(src/axon/.*\.py|tests/.*\.py|pyproject\.toml|src/axon/Cargo\.toml|requirements.*\.txt|config\.yaml)$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: '\.(gif|mp4|webm|png|jpg|jpeg|svg)$|integrations/vscode-axon/media/.*\.js$|integrations/vscode-axon/.*\.vsix$|docs/demos/.*\.html$'
      - id: check-json
      - id: check-toml
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: trim-trailing-whitespace
        name: trim trailing whitespace
        entry: python scripts/trim_trailing_whitespace.py
        language: system
        types: [text]
        pass_filenames: true
        exclude: '\.(gif|png|jpg|jpeg|svg|mp4|webm|vsix|woff|woff2|ttf|eot|ico|bin|pyc)$|integrations/vscode-axon/media/.*\.js$'
      - id: check-merge-conflict
        name: check for merge conflicts
        entry: python scripts/check_merge_conflict.py
        language: system
        types: [text]
        pass_filenames: true
      - id: py-compile
        name: py_compile
        entry: python -m py_compile
        language: system
        files: ^src/axon/.*\.py$
        pass_filenames: true
      - id: pytest-check
        name: pytest
        # Trigger ONLY on files that could actually affect test outcomes:
        #   - src/axon/**/*.py     — package source (imported by tests)
        #   - tests/**/*.py        — the tests themselves
        #   - pyproject.toml       — dependencies, build config
        #   - src/axon/Cargo.toml  — Rust extension version + deps
        #   - requirements*.txt    — pinned deps
        #   - config.yaml          — runtime defaults the tests load
        # NOT triggered: scripts/*.py (standalone CLI tools never imported
        # by tests), docs/*, integrations/vscode-axon/* (its own test suite),
        # *.html/*.md/*.svg/*.json. Pure doc/script commits run pre-commit
        # in <2 sec total. --testmon then selects only tests whose deps
        # changed since the last green run (.testmondata, gitignored).
        # CI does NOT use --testmon and runs the full suite as the safety net.
        entry: python -m pytest tests/ --testmon --tb=short --no-cov -m "not extension" --ignore=tests/e2e --ignore=tests/e2e_sync
        language: system
        pass_filenames: false
        files: *test-trigger-files
        stages: [pre-commit]
      - id: eval-smoke
        name: evaluation-smoke
        # Same gating as pytest — only real source/dep edits trigger eval.
        entry: python -m pytest tests/test_eval_smoke.py -m eval -v --tb=short --no-header
        language: system
        pass_filenames: false
        files: *test-trigger-files
        stages: [pre-commit]

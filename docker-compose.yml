# Docker Compose for Local RAG Brain
services:
  rag-brain-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./chroma_data:/app/chroma_data
      - ./bm25_index:/app/bm25_index
      - ./config.yaml:/app/config.yaml
    environment:
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  rag-brain-ui:
    build: .
    ports:
      - "8501:8501"
    command: ["rag-brain-ui"]
    volumes:
      - ./src:/app/src
      - ./chroma_data:/app/chroma_data
      - ./bm25_index:/app/bm25_index
      - ./config.yaml:/app/config.yaml
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - RAG_BRAIN_API_URL=http://rag-brain-api:8000
    env_file:
      - .env
    depends_on:
      - ollama
      - rag-brain-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Local Dockerized Ollama Engine
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped


# Docker Compose for Axon
services:
  axon-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./chroma_data:/app/chroma_data
      - ./bm25_index:/app/bm25_index
      - ./config.yaml:/app/config.yaml
    environment:
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - path: .env
        required: false
    depends_on:
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  axon-ui:
    build: .
    ports:
      - "8501:8501"
    command: ["axon-ui"]
    volumes:
      - ./src:/app/src
      - ./chroma_data:/app/chroma_data
      - ./bm25_index:/app/bm25_index
      - ./config.yaml:/app/config.yaml
      - ./.streamlit:/app/.streamlit
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AXON_API_URL=http://axon-api:8000
    env_file:
      - path: .env
        required: false
    depends_on:
      - ollama
      - axon-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Local Dockerized Ollama Engine
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped


name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile src/rag_brain/main.py
          python -m py_compile src/rag_brain/api.py
          python -m py_compile src/rag_brain/loaders.py
          python -m py_compile src/rag_brain/retrievers.py
          python -m py_compile src/rag_brain/splitters.py
          python -m py_compile src/rag_brain/tools.py
          python -m py_compile src/rag_brain/webapp.py

      - name: Lint with ruff (if installed)
        run: |
          if pip show ruff &>/dev/null; then
            ruff check src/ tests/
          else
            echo "ruff not installed — skipping lint."
          fi

      - name: Format check with black (if installed)
        run: |
          if pip show black &>/dev/null; then
            black --check src/ tests/
          else
            echo "black not installed — skipping format check."
          fi

      - name: Type check with mypy (if installed)
        run: |
          if pip show mypy &>/dev/null; then
            mypy src/rag_brain/ --ignore-missing-imports --no-error-summary
          else
            echo "mypy not installed — skipping type check."
          fi
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d tests ] && [ -n "$(find tests -name '*.py' -not -name '__init__.py')" ]; then
            if pip show pytest-cov &>/dev/null; then
              python -m pytest tests/ -v --tb=short --cov=rag_brain --cov-report=xml --cov-report=term
            else
              python -m pytest tests/ -v --tb=short
            fi
          else
            echo "No tests found — skipping pytest. Add tests to tests/ to enable this step."
          fi

      - name: Run RAG evaluation smoke tests
        run: |
          python -m pytest tests/test_eval_smoke.py -m eval -v --tb=short --no-header

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t local-rag-brain:test .

    - name: Test Docker image
      run: |
        docker run --rm local-rag-brain:test rag-brain --help

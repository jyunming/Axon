name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux (glibc, most Linux distros)
          - os: ubuntu-latest
            maturin-target: x86_64
            maturin-manylinux: auto
          # Linux arm64 — manylinux (Raspberry Pi, AWS Graviton, Docker ARM)
          - os: ubuntu-latest
            maturin-target: aarch64
            maturin-manylinux: auto
          # Linux x86_64 musl — Alpine / distroless Docker images
          - os: ubuntu-latest
            maturin-target: x86_64-unknown-linux-musl
            maturin-manylinux: musllinux_1_2
          # macOS arm64 — Apple Silicon (M1/M2/M3)
          - os: macos-latest
            maturin-target: aarch64-apple-darwin
            maturin-manylinux: ""
          # macOS x86_64 — Intel Mac
          - os: macos-13
            maturin-target: x86_64-apple-darwin
            maturin-manylinux: ""
          # Windows x86_64
          - os: windows-latest
            maturin-target: x86_64
            maturin-manylinux: ""

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag version against pyproject.toml
        shell: bash
        run: |
          python scripts/audit_packaging.py --expected-version "${GITHUB_REF_NAME#v}"

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.maturin-target }}
          manylinux: ${{ matrix.maturin-manylinux }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - name: Build wheels (non-Linux)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.maturin-target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.maturin-target }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag version against Cargo version
        run: |
          python scripts/audit_packaging.py --expected-version "${GITHUB_REF_NAME#v}"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish release and PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Axon v${{ steps.version.outputs.VERSION }}"
          generate_notes: true
          files: upload/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
